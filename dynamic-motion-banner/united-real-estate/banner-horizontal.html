<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>United Real Estate — Banner horizontal</title>
  <script src="../config.js"></script>
  <script src="../banner-engine.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:728px;height:90px;overflow:hidden;font-family:Arial,sans-serif;background:#1a1a2e}
    .wrap{width:100%;height:100%;position:relative;display:flex;align-items:center;padding:0 16px;gap:12px;}
    .hero{position:absolute;inset:0;z-index:0}
    .hero img{width:100%;height:100%;object-fit:cover;opacity:.42}
    .cnt{position:relative;z-index:1;display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
    h2{color:#fff;font-size:14px;white-space:nowrap;flex-shrink:0} p{color:rgba(255,255,255,.7);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px}
    .cta{display:inline-block;background:#d4af37;color:#000;font-weight:700;font-size:12px;padding:6px 14px;text-decoration:none;white-space:nowrap;border-radius:1px;flex-shrink:0}
  </style>
</head>
<body>
  <div class="wrap" data-slug="united-real-estate" data-format="horizontal">
    <div class="hero"><img src="https://fotos15.apinmo.com/6689/23276849/4-1.jpg" data-b-hero alt="" onerror="this.parentElement.style.display='none'"></div>
    <div class="cnt">
      
      <h2 data-b-name>United Real Estate</h2>
      <p data-b-claim>Experiencia inmobiliaria premium</p>
    </div>
    <a class="cta" href="#contact" data-b-cta target="_blank" rel="noopener">Solicitar Propuesta</a>
  </div>
</body>
</html>
