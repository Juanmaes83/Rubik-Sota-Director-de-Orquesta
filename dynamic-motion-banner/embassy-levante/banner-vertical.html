<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embassy Levante · Banner Vertical · 1080×1920</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #080604; }
    body { display: grid; place-items: center; min-height: 100vh; }
    .canvas-wrap { width: 1080px; height: 1920px; box-shadow: 0 24px 70px rgba(0,0,0,0.48); position: relative; background: #0d0b09; }
    canvas { display: block; width: 100%; height: 100%; }
    .qr-layer { position: absolute; right: 38px; bottom: 345px; width: 238px; height: 238px; pointer-events: none; }
    @media (max-width: 1120px) { .canvas-wrap { transform: scale(0.45); transform-origin: top center; } }
    @media (max-width: 560px) { .canvas-wrap { transform: scale(0.32); transform-origin: top center; } }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="canvas-wrap">
    <canvas id="banner-canvas" width="1080" height="1920"></canvas>
    <div id="qr-layer" class="qr-layer"></div>
  </div>
  <script type="module">
    import { BannerEngine } from "/dynamic-motion-banner/embassy-levante/banner-engine.js";
    new BannerEngine("banner-canvas", {
      orientation: "vertical",
      qrContainer: document.getElementById("qr-layer")
    });
  </script>
</body>
</html>
