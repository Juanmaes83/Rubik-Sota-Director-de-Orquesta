<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casas y Mar · Experiencia Visual de Propiedad</title>
  <meta name="description" content="Experiencia Visual de Propiedad para Casas y Mar — pieza dinámica con tour, galería, QR y contacto directo.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="Casas y Mar · Experiencia Visual de Propiedad">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_ES">
  <style>
    :root {
      --bg: #080706;
      --panel: #15120f;
      --text: #f7f1e8;
      --muted: #b8aa98;
      --gold: #c9a66b;
      --amber: #e8cd9a;
      --line: rgba(232, 205, 154, 0.18);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }
    body {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* Cabecera muy ligera — sólo branding cliente, sin lenguaje de herramienta */
    .brand-bar {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-bar img { height: 38px; width: auto; }
    .brand-bar .title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    .brand-bar .title small {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Escenario de la pieza animada */
    main {
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .stage-wrap {
      width: 540px;
      height: 960px;
      max-width: 100%;
      max-height: calc(100vh - 160px);
      aspect-ratio: 540 / 960;
      position: relative;
      background: #0f0e0c;
      box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px var(--line);
      overflow: hidden;
    }
    canvas { display: block; width: 100%; height: 100%; }
    .qr-layer { position: absolute; pointer-events: none; }

    footer {
      padding: 18px 24px 26px;
      color: var(--muted);
      font-size: 0.74rem;
      text-align: center;
      letter-spacing: 0.04em;
    }
    footer a { color: var(--amber); text-decoration: none; }

    /* Modo embed: ?embed=1 — limpia todo lo no esencial para iframe */
    body.is-embed { background: transparent; min-height: 0; }
    body.is-embed .brand-bar,
    body.is-embed footer { display: none; }
    body.is-embed main { padding: 0; min-height: 100vh; }
    body.is-embed .stage-wrap { box-shadow: none; }

    @media (max-width: 640px) {
      .brand-bar { padding: 14px 16px; }
      .brand-bar .title { font-size: 0.95rem; }
      main { padding: 12px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="brand-bar">
    <img src="./assets/logo.svg" alt="Casas y Mar">
    <div class="title">
      Casas y Mar
      <small>Experiencia Visual de Propiedad</small>
    </div>
  </div>

  <main>
    <div id="wrap" class="stage-wrap">
      <canvas id="banner-canvas" width="540" height="960"></canvas>
      <div id="qr-layer" class="qr-layer"></div>
    </div>
  </main>

  <footer>
    Torrevieja · Costa Blanca Sur · <a href="https://aurum-properties-boutique.vercel.app/casas-y-mar" target="_blank" rel="noopener noreferrer">aurum-properties-boutique.vercel.app/casas-y-mar</a>
  </footer>

  <script type="module">
    import { BannerEngine } from "./banner-engine.js";

    const wrap = document.getElementById("wrap");
    const canvas = document.getElementById("banner-canvas");
    const qrLayer = document.getElementById("qr-layer");

    // ?embed=1 → modo iframe limpio
    const params = new URLSearchParams(location.search);
    if (params.get("embed") === "1") document.body.classList.add("is-embed");

    // Inicialización de tamaño y QR para la pieza vertical 540x960 (ratio 9:16).
    function init() {
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      const qrSize = w * 0.22;
      const qrRight = w * 0.085;
      const qrBottom = h * 0.26 - qrSize;
      qrLayer.style.width = qrSize + "px";
      qrLayer.style.height = qrSize + "px";
      qrLayer.style.right = qrRight + "px";
      qrLayer.style.bottom = Math.max(0, qrBottom) + "px";
      qrLayer.innerHTML = "";
    }

    init();
    const engine = new BannerEngine("banner-canvas", { orientation: "vertical", qrContainer: qrLayer });

    let resizeRaf = null;
    window.addEventListener("resize", () => {
      if (resizeRaf) cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(() => {
        init();
        if (engine) engine.resize();
      });
    });
  </script>
</body>
</html>
