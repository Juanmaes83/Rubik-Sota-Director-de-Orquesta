<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SWORD RAIN launcher para Gesture Lab." />
  <title>SWORD RAIN - Gesture Lab</title>
  <style>
    :root {
      --bg: #030303;
      --fg: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --line: rgba(255, 255, 255, 0.16);
      --accent: #00ffcc;
      --panel: rgba(255, 255, 255, 0.055);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 16%, rgba(0, 255, 204, 0.16), transparent 34%),
        radial-gradient(circle at 80% 78%, rgba(216, 255, 62, 0.10), transparent 32%),
        var(--bg);
      color: var(--fg);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: clamp(1rem, 4vw, 3rem);
    }
    main {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.075), var(--panel));
      padding: clamp(1.4rem, 4vw, 2.6rem);
      box-shadow: 0 30px 90px rgba(0,0,0,0.58);
    }
    .eyebrow {
      color: var(--accent);
      font-size: 0.74rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 8vw, 5.2rem);
      line-height: 0.92;
      letter-spacing: -0.075em;
    }
    .subtitle {
      margin: 1rem 0 0;
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      font-weight: 800;
    }
    p {
      color: var(--muted);
      line-height: 1.65;
      font-size: 1rem;
    }
    .notice {
      border: 1px solid rgba(0,255,204,0.28);
      border-radius: 18px;
      padding: 0.9rem 1rem;
      background: rgba(0,255,204,0.07);
      color: var(--fg);
      font-weight: 700;
    }
    .actions {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      margin-top: 1.3rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 999px;
      padding: 0.72rem 1rem;
      border: 1px solid var(--line);
      color: var(--fg);
      text-decoration: none;
      font-weight: 900;
      font-size: 0.86rem;
    }
    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #001f1a;
    }
    @media (max-width: 560px) {
      .actions a { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Gesture Lab - R&D launcher</div>
    <h1>SWORD RAIN</h1>
    <p class="subtitle">Hand-controlled sword rain demo.</p>
    <p>Demo gestual experimental con lluvia de espadas, camara local, MediaPipe y Three.js.</p>
    <p class="notice">La demo se abre como experiencia externa. La camara se usa localmente en el navegador.</p>
    <div class="actions">
      <a class="primary" href="https://juanmaes83.github.io/sword-rain-hand-control/" target="_blank" rel="noopener noreferrer">Abrir demo publica</a>
      <a href="../">Volver a Gesture Lab</a>
    </div>
  </main>
</body>
</html>
